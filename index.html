<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SouA1ma - Links Oficiais</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --cor-fundo-top: #ff4500; 
            --cor-fundo-bottom: #2b0000; 
            --cor-botao: rgba(255, 255, 255, 0.15);
            --cor-texto: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, var(--cor-fundo-top), var(--cor-fundo-bottom));
            background-attachment: fixed;
            color: var(--cor-texto);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .background-notes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .note {
            position: absolute;
            font-size: 2rem;
            color: rgba(255, 255, 255, 0.2);
            animation: float 10s linear infinite;
            bottom: -50px;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        .container {
            width: 90%;
            max-width: 400px;
            text-align: center;
            padding: 40px 0;
        }

        .perfil-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            margin-bottom: 15px;
            object-fit: cover;
        }

        h1 { font-size: 1.5rem; margin-bottom: 5px; }
        p { font-style: italic; opacity: 0.9; margin-bottom: 30px; }

        .teatro-icon {
            font-size: 1.2rem;
            margin-bottom: 20px;
            display: block;
        }

        .link-card {
            background: var(--cor-botao);
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease, background 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .link-card:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.25);
        }

        .link-card i {
            position: absolute;
            left: 20px;
            font-size: 1.4rem;
        }

        footer { margin-top: auto; padding-bottom: 20px; font-size: 0.8rem; opacity: 0.7; }
    </style>
</head>

    <div class="background-notes">

        <div class="note" style="left: 90%; animation-duration: 15s; animation-delay: 3s;">♯</div>
        <div class="note" style="left: 5%; animation-duration: 7s; animation-delay: 4s;">♬</div>
        <div class="note" style="left: 38%; animation-duration: 10s; animation-delay: 2s;">♩</div>
    </div>
